<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>najviacdivnyblog</title>
<link rel="icon" href="img/ndb-favicon-32x32" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --paper:#E9E4D6;
    --paper2:#E0D9C8;
    --ink:#141310;
    --card:#F3EFE4;
    --red:#FF3B1F;
    --red-dark:#C22910;
    --blue:#1D2BDB;
    --yellow:#F0E000;
  }

  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}

  body{
    margin:0;
    background:var(--paper);
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.025) 0px, rgba(0,0,0,0.025) 1px, transparent 1px, transparent 3px);
    color:var(--ink);
    font-family:'Space Mono', monospace;
    -webkit-font-smoothing:antialiased;
    padding-bottom:100px;
  }

  .disp{
    font-family:'Space Mono', monospace;
    font-weight:700;
    letter-spacing:-0.01em;
  }

  a{color:inherit;}

  /* ---------- header ---------- */
  header{
    position:sticky; top:0; z-index:40;
    background:var(--paper);
    border-bottom:4px solid var(--ink);
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px;
    gap:12px;
  }
  .logo{font-size:16px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .logo span{color:var(--red);}
  .authState{font-size:11px; letter-spacing:0.03em; text-align:right; flex-shrink:0;}
  .authState button{
    background:none; border:none; color:var(--ink); text-decoration:underline;
    font-family:'Space Mono',monospace; font-size:11px; cursor:pointer; padding:0;
  }

  /* ---------- hero ---------- */
  .hero{padding:44px 20px 32px; border-bottom:4px solid var(--ink);}
  .hero-title{font-size:clamp(26px, 7vw, 60px); line-height:1.02; margin:0; word-break:break-word;}
  .hero-sub{margin-top:16px; max-width:520px; font-size:13px; line-height:1.7;}
  .hero-sub .cursor{
    display:inline-block; width:8px; height:13px; background:var(--ink);
    margin-left:2px; animation:blink 1s steps(1) infinite; vertical-align:middle;
  }
  @keyframes blink{50%{opacity:0;}}

  /* ---------- filter bar ---------- */
  .filters{
    padding:14px 20px; display:flex; flex-wrap:wrap; gap:8px;
    border-bottom:4px solid var(--ink); background:var(--paper2);
    position:sticky; top:57px; z-index:30;
  }
  .chip{
    font-family:'Space Mono',monospace; font-size:12px; letter-spacing:0.02em;
    background:var(--card); border:2px solid var(--ink);
    padding:8px 12px; cursor:pointer; min-height:36px;
  }
  .chip.active{background:var(--ink); color:var(--paper);}

  /* ---------- grid ---------- */
  main{padding:28px 20px 48px;}
  .grid{display:grid; grid-template-columns:repeat(6, 1fr); gap:24px;}
  .card{
    grid-column:span 3; position:relative; background:var(--card);
    border:3px solid var(--ink); box-shadow:8px 8px 0 var(--ink);
    padding:22px 18px 16px; cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .card:nth-child(3n+1){transform:rotate(-0.6deg);}
  .card:nth-child(3n+2){transform:rotate(0.5deg);}
  .card:nth-child(3n+3){transform:rotate(-0.3deg);}
  .card:hover{transform:translate(-3px,-3px) rotate(0deg); box-shadow:11px 11px 0 var(--ink);}
  .card.big{grid-column:span 6;}
  .card.big .card-title{font-size:28px;}

  .stamp{
    position:absolute; top:-15px; left:-15px; width:42px; height:42px;
    border-radius:50%; border:3px solid var(--red); color:var(--red-dark);
    background:var(--paper); display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; transform:rotate(-14deg);
  }
  .card-tag{
    display:inline-block; font-size:11px; letter-spacing:0.04em;
    background:var(--yellow); border:2px solid var(--ink); padding:2px 8px; margin-bottom:12px;
  }
  .card-title{margin:0 0 10px; font-size:21px; line-height:1.15;}
  .card-excerpt{font-size:13px; line-height:1.6; color:#3a382f; margin:0 0 16px;}
  .card-meta{
    display:flex; justify-content:space-between; align-items:center;
    font-size:11px; letter-spacing:0.03em; border-top:2px dashed var(--ink); padding-top:10px;
  }

  .empty{grid-column:span 6; border:3px dashed var(--ink); padding:50px 20px; text-align:center;}
  .empty h2{font-size:24px; margin:0 0 10px;}
  .empty p{font-size:13px; margin:0 0 20px; color:#3a382f;}
  .state-msg{grid-column:span 6; text-align:center; padding:50px 20px; font-size:13px; color:#3a382f;}

  footer{
    border-top:4px solid var(--ink); padding:14px 20px;
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px;
    font-size:11px; letter-spacing:0.02em; background:var(--paper2);
  }

  /* ---------- floating new-post button ---------- */
  @keyframes pulseRing{
    0%{box-shadow:8px 8px 0 var(--ink), 0 0 0 0 rgba(255,59,31,0.55);}
    70%{box-shadow:8px 8px 0 var(--ink), 0 0 0 16px rgba(255,59,31,0);}
    100%{box-shadow:8px 8px 0 var(--ink), 0 0 0 0 rgba(255,59,31,0);}
  }
  .fab{
    position:fixed; left:50%; bottom:22px; transform:translateX(-50%);
    width:62px; height:62px; border-radius:50%;
    background:var(--red); border:3px solid var(--ink); color:#fff;
    font-size:28px; line-height:1; display:flex; align-items:center; justify-content:center;
    cursor:pointer; z-index:60; font-family:'Space Mono',monospace; font-weight:700;
    animation:pulseRing 2.6s infinite;
    transition:transform .12s ease;
  }
  .fab:hover{transform:translateX(-50%) translateY(-2px);}
  .fab:active{transform:translateX(-50%) scale(0.9);}
  .fab-label{
    position:fixed; left:50%; bottom:90px; transform:translateX(-50%);
    font-size:10px; letter-spacing:0.06em; background:var(--ink); color:var(--paper);
    padding:4px 10px; z-index:60; white-space:nowrap;
  }

  /* ---------- overlay (shared) ---------- */
  .overlay{
    position:fixed; inset:0; z-index:100; background:rgba(20,19,16,0.72);
    display:none; align-items:flex-start; justify-content:center;
    padding:40px 20px; overflow-y:auto;
  }
  .overlay.open{display:flex;}
  .sheet{
    background:var(--card); border:4px solid var(--ink); box-shadow:12px 12px 0 var(--ink);
    width:100%; max-width:620px; padding:30px 26px; position:relative;
  }
  .sheet.narrow{max-width:380px;}
  .sheet-close{
    position:absolute; top:14px; right:14px; width:36px; height:36px;
    background:var(--ink); color:var(--paper); border:none; cursor:pointer;
    font-family:'Space Mono',monospace; font-size:16px; font-weight:700;
  }

  label{display:block; font-size:11px; letter-spacing:0.05em; margin:16px 0 6px;}
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=email], input[type=password], textarea{
    width:100%; font-family:'Space Mono',monospace; font-size:15px;
    background:#fff; border:2px solid var(--ink); padding:11px 12px; outline:none;
  }
  input:focus, textarea:focus{border-color:var(--blue);}
  textarea{resize:vertical; min-height:150px; line-height:1.6;}

  .form-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:22px; flex-wrap:wrap;}
  .btn-ghost{
    font-family:'Space Mono',monospace; font-size:13px; font-weight:700;
    background:transparent; border:2px solid var(--ink); color:var(--ink);
    padding:11px 16px; cursor:pointer; min-height:42px;
  }
  .btn-stamp{
    font-family:'Space Mono',monospace; font-size:13px; font-weight:700;
    background:var(--red); color:#fff; border:3px solid var(--ink);
    padding:11px 18px; cursor:pointer; box-shadow:4px 4px 0 var(--ink);
    transition:transform .1s ease; min-height:42px;
  }
  .btn-stamp:active{transform:scale(0.94) rotate(-2deg);}
  .btn-danger{
    font-family:'Space Mono',monospace; font-size:12px; font-weight:700;
    background:transparent; border:2px solid var(--red-dark); color:var(--red-dark);
    padding:9px 14px; cursor:pointer; min-height:40px;
  }
  .err{color:var(--red-dark); font-size:11px; margin-top:8px; display:none;}
  .err.show{display:block;}
  .hint{font-size:11px; color:#5a5748; margin-top:14px; line-height:1.6;}

  /* ---------- reader: optimized for comfortable mobile reading ---------- */
  .reader-tag{display:inline-block; font-size:11px; letter-spacing:0.05em; background:var(--yellow); border:2px solid var(--ink); padding:2px 8px; margin-bottom:14px;}
  .reader-title{font-size:28px; margin:0 0 8px; line-height:1.12;}
  .reader-meta{font-size:11px; color:#3a382f; margin-bottom:20px; border-bottom:2px dashed var(--ink); padding-bottom:14px;}
  .reader-body{font-size:15px; line-height:1.85; white-space:pre-wrap; max-width:64ch;}
  .reader-actions{margin-top:24px; display:flex; justify-content:space-between; align-items:center; border-top:2px dashed var(--ink); padding-top:14px;}

  @media (max-width:720px){
    .grid{grid-template-columns:1fr;}
    .card{grid-column:span 1 !important;}
    header{padding:12px 16px;}
    .filters{top:53px;}
    .hero{padding:32px 16px 24px;}
    main{padding:20px 16px 40px;}

    #readerOverlay{padding:0;}
    #readerOverlay .sheet{
      max-width:none; width:100%; min-height:100vh;
      border:none; box-shadow:none; padding:20px 18px 120px;
    }
    #readerOverlay .sheet-close{
      position:sticky; top:0; float:right; margin-bottom:8px;
    }
    .reader-title{font-size:24px;}
    .reader-body{font-size:16px; line-height:1.9; max-width:none;}
  }
</style>
</head>
<body>

<header>
  <div class="logo disp">najviac<span>divny</span>blog</div>
  <div class="authState" id="authState"></div>
</header>

<section class="hero">
  <h1 class="hero-title disp">najviacdivnyblog</h1>
  <p class="hero-sub">divný ľuďia. divné správy. divný blog.<span class="cursor"></span></p>
</section>

<div class="filters" id="filters"></div>

<main>
  <div class="grid" id="grid">
    <div class="state-msg">načítavam archív…</div>
  </div>
</main>

<footer>
  <span id="footCount">— ZÁPISOV V ARCHÍVE</span>
  <span id="footUpdated">—</span>
</footer>

<div class="fab-label" id="fabLabel">nový zápis</div>
<button class="fab" id="btnNew" aria-label="Nový zápis">+</button>

<!-- login overlay -->
<div class="overlay" id="authOverlay">
  <div class="sheet narrow">
    <button class="sheet-close" id="closeAuth" aria-label="Zavrieť">×</button>
    <h2 class="disp" style="font-size:20px;margin:0 0 4px;">prihlásenie</h2>
    <p class="hint" style="margin-top:6px;">Táto akcia je vyhradená pre správcu blogu.</p>
    <label for="authEmail">E-MAIL</label>
    <input type="email" id="authEmail" placeholder="tvoj@email.sk">
    <label for="authPw">HESLO</label>
    <input type="password" id="authPw" placeholder="••••••••">
    <div class="err" id="authErr">Nesprávny e-mail alebo heslo.</div>
    <div class="form-actions">
      <button class="btn-ghost" id="authCancel">ZRUŠIŤ</button>
      <button class="btn-stamp" id="authSubmit">PRIHLÁSIŤ</button>
    </div>
  </div>
</div>

<!-- new post overlay -->
<div class="overlay" id="formOverlay">
  <div class="sheet">
    <button class="sheet-close" id="closeForm" aria-label="Zavrieť">×</button>
    <h2 class="disp" style="font-size:22px;margin:0 0 4px;">nový zápis</h2>
    <label for="fTitle">NÁZOV</label>
    <input type="text" id="fTitle" placeholder="napr. Nedeľné myšlienky">
    <label for="fTag">ŠTÍTOK</label>
    <input type="text" id="fTag" placeholder="napr. myšlienky">
    <label for="fBody">TEXT</label>
    <textarea id="fBody" placeholder="Píš."></textarea>
    <div class="err" id="formErr">Nepodarilo sa uložiť zápis.</div>
    <div class="form-actions">
      <button class="btn-ghost" id="cancelForm">ZRUŠIŤ</button>
      <button class="btn-stamp" id="submitForm">PUBLIKOVAŤ</button>
    </div>
  </div>
</div>

<!-- reader overlay -->
<div class="overlay" id="readerOverlay">
  <div class="sheet">
    <button class="sheet-close" id="closeReader" aria-label="Zavrieť">×</button>
    <div class="reader-tag" id="rTag"></div>
    <h2 class="disp reader-title" id="rTitle"></h2>
    <div class="reader-meta" id="rMeta"></div>
    <div class="reader-body" id="rBody"></div>
    <div class="reader-actions">
      <button class="btn-danger" id="rDelete">VYMAZAŤ ZÁPIS</button>
      <button class="btn-ghost" id="rClose2">ZAVRIEŤ</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://vjbuhwxxbqkbdtobmwna.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqYnVod3h4YnFrYmR0b2Jtd25hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMDc4NDksImV4cCI6MjA5ODY4Mzg0OX0.Kjvc3lVT3O_UYKttnMXICatPUj9i8z46Z0qpg8Rq86I";

const configured = !SUPABASE_URL.startsWith("TVOJ_") && !SUPABASE_ANON_KEY.startsWith("TVOJ_");
const sb = configured ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

let posts = [];
let activeTag = 'VŠETKY';
let pendingAction = null;
let loggedIn = false;

const MONTHS = ['jan','feb','mar','apr','máj','jún','júl','aug','sep','okt','nov','dec'];
function fmtDate(ts){
  const d = new Date(ts);
  return d.getDate() + '. ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function excerpt(text){
  const clean = text.trim().replace(/\s+/g,' ');
  return clean.length > 140 ? clean.slice(0,140) + '…' : clean;
}

/* ---------- data ---------- */
async function loadPosts(){
  if(!configured){
    document.getElementById('grid').innerHTML = `<div class="state-msg">Supabase ešte nie je nastavený. Vyplň SUPABASE_URL a SUPABASE_ANON_KEY v kóde stránky.</div>`;
    return;
  }
  const { data, error } = await sb.from('posts').select('*').order('created_at', { ascending:false });
  if(error){
    document.getElementById('grid').innerHTML = `<div class="state-msg">Nepodarilo sa načítať zápisy: ${escapeHtml(error.message)}</div>`;
    return;
  }
  posts = data.map(p => ({
    id: p.id,
    title: p.title,
    tag: p.tag || 'bez štítku',
    content: p.content,
    date: new Date(p.created_at).getTime()
  }));
  render();
}

/* ---------- auth ---------- */
function updateAuthUI(){
  const el = document.getElementById('authState');
  el.innerHTML = loggedIn
    ? 'prihlásený/á · <button id="signOutBtn">odhlásiť</button>'
    : '';
  if(loggedIn) document.getElementById('signOutBtn').onclick = () => sb.auth.signOut();
}

async function initAuth(){
  if(!configured) return;
  const { data:{ session } } = await sb.auth.getSession();
  loggedIn = !!session;
  updateAuthUI();
  sb.auth.onAuthStateChange((_event, session) => {
    loggedIn = !!session;
    updateAuthUI();
  });
  sb.channel('posts-changes')
    .on('postgres_changes', { event:'*', schema:'public', table:'posts' }, loadPosts)
    .subscribe();
}

function requireAuth(action){
  if(!configured){
    alert('Najprv nastav Supabase (pozri komentár v kóde stránky).');
    return;
  }
  if(loggedIn){ action(); return; }
  pendingAction = action;
  document.getElementById('authErr').classList.remove('show');
  document.getElementById('authEmail').value = '';
  document.getElementById('authPw').value = '';
  document.getElementById('authOverlay').classList.add('open');
  document.getElementById('authEmail').focus();
}
function closeAuth(){
  document.getElementById('authOverlay').classList.remove('open');
  pendingAction = null;
}
async function submitAuth(){
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPw').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if(error){
    document.getElementById('authErr').classList.add('show');
    return;
  }
  loggedIn = true;
  updateAuthUI();
  document.getElementById('authOverlay').classList.remove('open');
  const action = pendingAction;
  pendingAction = null;
  if(action) action();
}

/* ---------- render ---------- */
function render(){
  const grid = document.getElementById('grid');
  const filters = document.getElementById('filters');

  const tags = ['VŠETKY', ...new Set(posts.map(p => p.tag.toUpperCase()).filter(Boolean))];
  filters.innerHTML = '';
  tags.forEach(t => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (t === activeTag ? ' active' : '');
    chip.textContent = t;
    chip.onclick = () => { activeTag = t; render(); };
    filters.appendChild(chip);
  });

  const visible = activeTag === 'VŠETKY' ? posts : posts.filter(p => p.tag.toUpperCase() === activeTag);

  grid.innerHTML = '';
  if(visible.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML = `
      <h2 class="disp">prázdna skrinka</h2>
      <p>Zatiaľ žiadne zápisy. Napíš prvý — tlačidlo dole v strede.</p>
    `;
    grid.appendChild(empty);
  }else{
    visible.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'card' + (i === 0 && activeTag === 'VŠETKY' ? ' big' : '');
      card.innerHTML = `
        <div class="stamp">#${String(posts.length - posts.indexOf(p)).padStart(2,'0')}</div>
        <div class="card-tag">${escapeHtml(p.tag)}</div>
        <h3 class="card-title disp">${escapeHtml(p.title)}</h3>
        <p class="card-excerpt">${escapeHtml(excerpt(p.content))}</p>
        <div class="card-meta">
          <span>${fmtDate(p.date)}</span>
          <span>čítať →</span>
        </div>
      `;
      card.onclick = () => openReader(p.id);
      grid.appendChild(card);
    });
  }

  document.getElementById('footCount').textContent = posts.length + ' ' + (posts.length === 1 ? 'ZÁPIS' : 'ZÁPISOV') + ' V ARCHÍVE';
  document.getElementById('footUpdated').textContent = posts.length ? 'POSLEDNÝ: ' + fmtDate(posts[0].date) : '—';
}

/* ---------- new post ---------- */
function requestNewPost(){ requireAuth(openForm); }
function openForm(){
  document.getElementById('fTitle').value = '';
  document.getElementById('fTag').value = '';
  document.getElementById('fBody').value = '';
  document.getElementById('formErr').classList.remove('show');
  document.getElementById('formOverlay').classList.add('open');
  document.getElementById('fTitle').focus();
}
function closeForm(){ document.getElementById('formOverlay').classList.remove('open'); }
async function submitForm(){
  const title = document.getElementById('fTitle').value.trim();
  const tag = document.getElementById('fTag').value.trim();
  const content = document.getElementById('fBody').value.trim();
  if(!title || !content){
    document.getElementById(!title ? 'fTitle' : 'fBody').style.borderColor = '#FF3B1F';
    return;
  }
  const { error } = await sb.from('posts').insert({ title, tag: tag || 'bez štítku', content });
  if(error){
    document.getElementById('formErr').classList.add('show');
    return;
  }
  closeForm();
  activeTag = 'VŠETKY';
  loadPosts();
}

/* ---------- reader ---------- */
let currentReaderId = null;
function openReader(id){
  const p = posts.find(x => x.id === id);
  if(!p) return;
  currentReaderId = id;
  document.getElementById('rTag').textContent = p.tag;
  document.getElementById('rTitle').textContent = p.title;
  document.getElementById('rMeta').textContent = fmtDate(p.date) + '  ·  #' + String(posts.length - posts.indexOf(p)).padStart(2,'0');
  document.getElementById('rBody').textContent = p.content;
  document.getElementById('readerOverlay').classList.add('open');
  document.getElementById('readerOverlay').scrollTop = 0;
}
function closeReader(){
  document.getElementById('readerOverlay').classList.remove('open');
  currentReaderId = null;
}
function requestDelete(){ requireAuth(deleteCurrent); }
async function deleteCurrent(){
  if(!currentReaderId) return;
  const { error } = await sb.from('posts').delete().eq('id', currentReaderId);
  if(error){ alert('Nepodarilo sa vymazať zápis: ' + error.message); return; }
  closeReader();
  loadPosts();
}

/* ---------- wiring ---------- */
document.getElementById('btnNew').onclick = requestNewPost;
document.getElementById('closeForm').onclick = closeForm;
document.getElementById('cancelForm').onclick = closeForm;
document.getElementById('submitForm').onclick = submitForm;
document.getElementById('closeReader').onclick = closeReader;
document.getElementById('rClose2').onclick = closeReader;
document.getElementById('rDelete').onclick = requestDelete;
document.getElementById('closeAuth').onclick = closeAuth;
document.getElementById('authCancel').onclick = closeAuth;
document.getElementById('authSubmit').onclick = submitAuth;
document.getElementById('authPw').addEventListener('keydown', e => { if(e.key === 'Enter') submitAuth(); });

document.getElementById('formOverlay').addEventListener('click', e => { if(e.target.id === 'formOverlay') closeForm(); });
document.getElementById('readerOverlay').addEventListener('click', e => { if(e.target.id === 'readerOverlay') closeReader(); });
document.getElementById('authOverlay').addEventListener('click', e => { if(e.target.id === 'authOverlay') closeAuth(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape'){ closeForm(); closeReader(); closeAuth(); } });
['fTitle','fBody'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => { e.target.style.borderColor = ''; });
});

initAuth();
loadPosts();
</script>

</body>
</html>
